services:
  amneziawg:
    build:
      context: .
    image: amneziawg:local
    container_name: amneziawg
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "${AMNEZIAWG_PORT:-51820}:${AMNEZIAWG_PORT:-51820}/udp"
    volumes:
      - type: bind
        source: ./awg0.conf
        target: /etc/amnezia/amneziawg/awg0.conf
        read_only: true
        bind:
          create_host_path: false
    command:
      - sh
      - -c
      - |
        set -e
        test -c /dev/net/tun || { echo "Missing /dev/net/tun. Start Docker with TUN support enabled."; exit 1; }
        test -s /etc/amnezia/amneziawg/awg0.conf || { echo "Missing or empty ./awg0.conf. Mount a valid AmneziaWG config before starting."; exit 1; }
        up=0
        cleanup() {
          if [ "$$up" = "1" ]; then
            awg-quick down awg0 || true
          fi
        }
        trap cleanup INT TERM EXIT
        awg-quick up awg0
        up=1
        while true; do
          sleep 3600 &
          wait $$!
        done
    restart: unless-stopped
