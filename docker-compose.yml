services:
  amneziawg:
    build:
      context: .
    image: amneziawg:local
    container_name: amneziawg
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "${AMNEZIAWG_PORT:-51820}:${AMNEZIAWG_PORT:-51820}/udp"
    volumes:
      - type: bind
        source: ./awg0.conf
        target: /etc/amnezia/amneziawg/awg0.conf
        read_only: true
        bind:
          create_host_path: false
    command: >
      sh -c 'test -f /etc/amnezia/amneziawg/awg0.conf &&
      awg-quick up awg0 &&
      trap "awg-quick down awg0" INT TERM EXIT &&
      sleep infinity & wait'
    restart: unless-stopped
